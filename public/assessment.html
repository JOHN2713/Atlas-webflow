<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Private Wealth — Investment Profile Assessment</title>
<meta name="description" content="Investment Profile & Risk Assessment — Atlas Private Wealth & Legacy Office">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--navy-light:#2A3D66;--navy-90:rgba(27,42,74,.9);--white:#F7F3ED;--pure-white:#FFFFFF;--light-bg:#EBE7E0;--gray:#6B7280;--gray-light:#E5E7EB;--gray-lighter:#F1F5F9;--text:#1E293B;--text-light:#475569;--green:#16A34A;--red:#DC2626;--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);color:var(--text);background:var(--white);overflow-x:hidden}
::selection{background:var(--navy);color:var(--white)}
input[type="range"]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#D1D5DB;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--navy);border:3px solid var(--white);box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer;transition:transform .15s}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type="range"]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--navy);border:3px solid var(--white);box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes drawLine{from{width:0}to{width:60px}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.screen{display:none;opacity:0;transition:opacity .3s ease}.screen.active{display:block;opacity:1}

/* Language Toggle */
.lang-toggle{position:fixed;top:16px;right:16px;z-index:200;display:flex;background:rgba(255,255,255,.95);border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1);border:1px solid var(--gray-light);backdrop-filter:blur(8px)}
.lang-btn{padding:8px 16px;font-family:var(--sans);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .2s;letter-spacing:1px;background:transparent;color:var(--gray)}
.lang-btn.active{background:var(--navy);color:var(--white)}
.lang-toggle-dark{position:absolute;top:16px;right:16px;z-index:200}
.lang-toggle-dark .lang-btn{color:rgba(255,255,255,.5)}
.lang-toggle-dark .lang-btn.active{background:rgba(255,255,255,.15);color:var(--white)}

/* Cover / Welcome */
.welcome{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 80px;text-align:center;background:var(--white);position:relative}
.welcome-logo{font-family:var(--serif);font-size:clamp(38px,8vw,54px);font-weight:300;color:var(--navy);letter-spacing:16px;margin-bottom:16px;animation:fadeUp .8s ease}
.welcome-line{width:0;height:1px;background:var(--navy);margin:0 auto 16px;animation:drawLine .6s .3s ease forwards}
.welcome-sub{font-family:var(--sans);font-size:11px;color:var(--navy);letter-spacing:5px;text-transform:uppercase;margin-bottom:8px;opacity:0;animation:fadeUp .8s .2s ease forwards}
.welcome-tagline{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--gray);margin-bottom:48px;opacity:0;animation:fadeUp .8s .3s ease forwards}
.welcome-title{font-family:var(--serif);font-size:clamp(22px,5vw,28px);font-weight:600;color:var(--navy);margin-bottom:6px;opacity:0;animation:fadeUp .8s .35s ease forwards}
.welcome-title2{font-family:var(--sans);font-size:15px;color:var(--navy);margin-bottom:36px;opacity:0;animation:fadeUp .8s .4s ease forwards}
.welcome-form{max-width:380px;width:100%;opacity:0;animation:fadeUp .8s .5s ease forwards}
.form-group{margin-bottom:16px;text-align:left}
.form-label{font-size:11px;font-weight:600;color:var(--navy);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;padding:13px 16px;border:2px solid var(--gray-light);border-radius:8px;font-family:var(--sans);font-size:14px;color:var(--text);transition:border-color .2s;outline:none;background:var(--pure-white)}
.form-input:focus{border-color:var(--navy)}
.form-input::placeholder{color:#94A3B8}
.welcome-kpis{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin:32px 0;opacity:0;animation:fadeUp .8s .55s ease forwards}
.kpi-num{font-size:28px;font-weight:800;color:var(--navy)}.kpi-label{font-size:11px;color:var(--gray);margin-top:2px}
.btn-start{font-family:var(--sans);font-size:13px;font-weight:700;background:var(--navy);color:var(--white);border:none;border-radius:8px;padding:15px 48px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .3s;width:100%;max-width:380px;opacity:0;animation:fadeUp .8s .6s ease forwards}
.btn-start:hover{background:var(--navy-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(27,42,74,.25)}
.btn-start:disabled{background:#CBD5E1;cursor:default;transform:none;box-shadow:none}

/* Footer */
.footer{position:fixed;bottom:0;left:0;right:0;height:44px;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:100}
.footer span{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:1px}

/* Topbar */
.topbar{background:var(--navy);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.topbar-logo{font-family:var(--serif);font-size:17px;color:var(--white);letter-spacing:6px;font-weight:300}
.topbar-info{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:1px}
.progress-wrap{width:100%;height:3px;background:var(--gray-light);position:sticky;top:46px;z-index:89}
.progress-bar{height:100%;background:var(--navy);transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Content */
.content{max-width:700px;margin:0 auto;padding:32px 20px 100px}
.section-tag{font-size:11px;letter-spacing:4px;color:var(--navy);text-transform:uppercase;font-weight:600;margin-bottom:8px}
.section-line{width:40px;height:1.5px;background:var(--navy);margin-bottom:16px}
.section-title{font-family:var(--serif);font-size:clamp(21px,4vw,26px);font-weight:600;color:var(--navy);margin-bottom:16px;line-height:1.2}
.how-to{background:var(--light-bg);border-radius:10px;padding:14px 18px;margin-bottom:28px;border-left:3px solid var(--navy)}
.how-to p{font-size:13px;color:var(--text-light);line-height:1.6}

/* Questions */
.q-block{margin-bottom:36px;animation:slideIn .4s ease both}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.q-num{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--navy);opacity:.18;line-height:1;min-width:36px;flex-shrink:0}
.q-text{font-size:14.5px;color:var(--text);line-height:1.6;font-weight:500;padding-top:4px}
.opts{display:flex;flex-direction:column;gap:7px;padding-left:48px}
.opt{display:flex;align-items:flex-start;gap:12px;width:100%;padding:12px 16px;border-radius:10px;border:2px solid var(--gray-light);background:var(--pure-white);cursor:pointer;text-align:left;transition:all .2s;font-family:var(--sans)}
.opt:hover{border-color:#94A3B8;background:#FAFBFC}
.opt.sel{border-color:var(--navy);background:#EEF2FF}
.opt-l{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--gray-lighter);color:var(--navy);transition:all .2s;flex-shrink:0}
.opt.sel .opt-l{background:var(--navy);color:var(--white)}
.opt-t{font-size:13.5px;color:var(--text);line-height:1.5}
.opt.sel .opt-t{font-weight:600}

/* Section B */
.b-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--gray-light)}
.b-tbl{width:100%;border-collapse:collapse;min-width:520px}
.b-tbl thead th{background:var(--navy);color:var(--white);padding:10px 8px;font-size:10.5px;font-weight:700;text-align:center}
.b-tbl td{padding:9px 8px;font-size:12px;text-align:center;border-bottom:1px solid #F0F0F0;vertical-align:middle}
.b-tbl tr:last-child td{border-bottom:none}
.b-tbl tr:nth-child(even){background:var(--light-bg)}
.b-cell{cursor:pointer;transition:all .15s;border-radius:6px;padding:9px 6px}
.b-cell:hover{background:rgba(27,42,74,.04)}
.b-cell.sel-s{background:#EEF2FF;outline:2px solid var(--navy);font-weight:700}
.b-cell.sel-r{background:#FEF2F2;outline:2px solid var(--red);font-weight:700}
.b-num{font-weight:700;color:var(--navy)}
.b-win{color:var(--green)}.b-lose{color:var(--gray)}.b-lose-r{color:var(--red)}
.b-choice{font-weight:800;font-size:13px}
.b-switch{background:var(--light-bg);border-radius:10px;padding:14px 18px;margin-top:18px;text-align:center}
.b-switch-val{font-size:20px;font-weight:800;color:var(--navy);margin-top:4px}

/* Section C */
.path-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:12px;cursor:pointer;text-align:left;border:2px solid var(--gray-light);background:var(--pure-white);transition:all .25s;margin-bottom:9px}
.path-card:hover{border-color:#94A3B8}
.path-card.sel{border-color:var(--cc);background:color-mix(in srgb,var(--cc) 5%,white)}
.path-num{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;background:var(--gray-lighter);color:var(--navy);transition:all .25s}
.path-card.sel .path-num{background:var(--cc);color:var(--white)}
.path-info{flex:1}.path-name{font-weight:700;font-size:14px;color:var(--navy);margin-bottom:4px}
.path-stats{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--gray)}
.path-stats strong{color:var(--text)}.path-stats .best{color:var(--green)}.path-stats .worst{color:var(--red)}
.path-radio{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid #D1D5DB;display:flex;align-items:center;justify-content:center;transition:all .25s}
.path-card.sel .path-radio{border-color:var(--cc);background:var(--cc)}
.path-dot{width:7px;height:7px;border-radius:50%;background:var(--white);opacity:0;transition:opacity .2s}
.path-card.sel .path-dot{opacity:1}

/* Slider */
.slider-box{background:var(--light-bg);border-radius:14px;padding:24px 24px 20px;text-align:center}
.slider-val{font-size:36px;font-weight:800;color:var(--navy);margin-bottom:4px;letter-spacing:-1px}
.slider-pct{font-size:13px;color:var(--gray);margin-bottom:16px}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-top:6px}

/* Nav */
.nav{display:flex;justify-content:space-between;margin-top:36px;padding-top:20px;border-top:1px solid var(--gray-light)}
.btn-prev{font-size:13px;font-weight:600;color:var(--navy);background:transparent;border:none;cursor:pointer;padding:10px 0;transition:opacity .2s}
.btn-prev:disabled{color:#CBD5E1;cursor:default}
.btn-next{font-size:13px;font-weight:600;color:var(--white);letter-spacing:1px;background:var(--navy);border:none;border-radius:8px;padding:11px 28px;cursor:pointer;transition:all .2s}
.btn-next:disabled{background:#CBD5E1;cursor:default}
.btn-next:not(:disabled):hover{background:var(--navy-light)}

/* Intro */
.intro-card{display:flex;gap:12px;align-items:center;padding:12px 14px;background:var(--light-bg);border-radius:10px;margin-bottom:8px;transition:transform .2s}
.intro-card:hover{transform:translateX(4px)}
.intro-key{width:34px;height:34px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:800;font-size:13px;flex-shrink:0}
.intro-title{font-weight:600;font-size:13.5px;color:var(--navy)}.intro-desc{font-size:12px;color:var(--gray)}

/* Results */
.results-header{background:var(--navy);padding:36px 20px;text-align:center;color:var(--white)}
.results-header .sub{font-size:10px;letter-spacing:4px;opacity:.6;margin-bottom:8px;text-transform:uppercase}
.results-header h1{font-family:var(--serif);font-size:28px;font-weight:400}
.results-body{max-width:660px;margin:0 auto;padding:28px 20px 120px}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;border:4px solid var(--cc,var(--navy));display:flex;flex-direction:column;align-items:center;justify-content:center;animation:pulse .8s ease}
.score-big{font-size:36px;font-weight:800;color:var(--navy)}.score-of{font-size:11px;color:var(--gray)}
.profile-badge{display:inline-block;padding:6px 22px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:1px}
.rec-p{font-size:13px;color:var(--gray);margin-top:12px}.rec-n{font-size:14px;font-weight:600;color:var(--navy);margin-top:4px}
.bd-title{font-size:11px;letter-spacing:3px;color:var(--navy);text-transform:uppercase;margin-bottom:18px;font-weight:700}
.bar-row{margin-bottom:16px}
.bar-hdr{display:flex;justify-content:space-between;margin-bottom:5px}
.bar-lbl{font-size:12.5px;font-weight:600;color:var(--text)}.bar-val{font-size:12.5px;color:var(--gray)}.bar-w{font-size:10.5px}
.bar-track{height:7px;background:var(--gray-lighter);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--navy),var(--navy-light));transition:width 1s ease}
.dual-box{background:var(--light-bg);border-radius:12px;padding:22px;margin-top:28px}
.dual-grid{display:flex;gap:18px;flex-wrap:wrap}
.dual-col{flex:1;min-width:180px;text-align:center;padding:14px 0}
.dual-lbl{font-size:10px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.dual-num{font-size:26px;font-weight:800;color:var(--navy)}
.dual-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:10.5px;font-weight:600;margin-top:6px}
.dual-sub{font-size:9.5px;color:var(--gray);margin-top:4px}
.dual-sep{width:1px;background:#D1D5DB;align-self:stretch}
.dual-note{font-size:11.5px;color:var(--gray);text-align:center;margin-top:14px;line-height:1.5;font-style:italic}
.formula-box{background:#FAFBFC;border:1px solid var(--gray-light);border-radius:10px;padding:14px 16px;margin-top:22px;text-align:center;font-size:11px;color:var(--gray);font-family:monospace;line-height:1.8}
.formula-r{color:var(--navy);font-size:13px;font-weight:700}

/* CTA buttons */
.cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:32px}
.btn-cta{font-family:var(--sans);font-size:12px;font-weight:600;border-radius:8px;padding:13px 28px;cursor:pointer;letter-spacing:.5px;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--navy);color:var(--white);border:none}
.btn-primary:hover{background:var(--navy-light);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--navy);border:2px solid var(--navy)}
.btn-secondary:hover{background:var(--navy);color:var(--white)}
.btn-outline{background:transparent;color:var(--gray);border:1.5px solid var(--gray-light);font-size:11px;padding:10px 20px}
.btn-outline:hover{border-color:var(--navy);color:var(--navy)}
.disclaimer{font-size:9px;color:#94A3B8;line-height:1.5;margin-top:36px;text-align:center;border-top:1px solid var(--gray-light);padding-top:18px}

/* Thank you name */
.greeting{font-family:var(--serif);font-size:18px;color:var(--gray);font-style:italic;margin-bottom:8px}

@media(max-width:600px){
  .opts{padding-left:0}
  .path-stats{gap:8px;font-size:11px}
  .dual-grid{flex-direction:column}
  .dual-sep{width:100%;height:1px}
  .formula-box{font-size:9px}
  .cta-row{flex-direction:column;align-items:center}
  .lang-toggle,.lang-toggle-dark{top:10px;right:10px}
  .lang-btn{padding:6px 12px;font-size:11px}
}
</style>
</head>
<body>

<!-- Language Toggle (visible on all screens) -->
<div class="lang-toggle" id="lang-toggle">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button>
</div>

<!-- ==================== WELCOME ==================== -->
<div id="welcome" class="screen active">
  <div class="welcome">
    <div class="welcome-logo">A T L A S</div>
    <div class="welcome-line"></div>
    <div class="welcome-sub">PRIVATE WEALTH &amp; LEGACY OFFICE</div>
    <div class="welcome-tagline">Building Legacies. Preserving Wealth.</div>
    <div class="welcome-title" id="w-title"></div>
    <div class="welcome-title2" id="w-title2"></div>
    <div class="welcome-form">
      <div class="form-group">
        <label class="form-label" id="lbl-name"></label>
        <input type="text" class="form-input" id="inp-name" placeholder="">
      </div>
      <div class="form-group">
        <label class="form-label" id="lbl-email"></label>
        <input type="email" class="form-input" id="inp-email" placeholder="">
      </div>
      <div class="welcome-kpis">
        <div><div class="kpi-num">5</div><div class="kpi-label" id="kpi-sections"></div></div>

      <button class="btn-start" id="btn-go" onclick="startAssessment()" disabled></button>
    </div>
  </div>
  <div class="footer"><span>www.atlaswealthlegacy.com</span></div>
</div>

<!-- ==================== ASSESSMENT ==================== -->
<div id="app" class="screen">
  <div class="topbar">
    <span class="topbar-logo">ATLAS</span>
    <span class="topbar-info" id="ti"></span>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="pb"></div></div>
  <div class="content" id="ca"></div>
  <div class="footer"><span>www.atlaswealthlegacy.com</span></div>
</div>

<!-- ==================== RESULTS ==================== -->
<div id="res" class="screen">

    <div class="sub">Atlas Private Wealth &amp; Legacy Office</div>
    <h1 id="res-title"></h1>
  </div>
  <div class="results-body" id="rb"></div>
  <div class="footer"><span>www.atlaswealthlegacy.com</span></div>
</div>

          A: scores.A.toFixed(2),

          D: scores.D.toFixed(2),

        },
        tolerance: scores.tol.toFixed(2),

      })
    });

}

// ═══════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════
function compute(){
  const nA=[0,1,2,3,4].reduce((s,i)=>s+(ans['A'+i]||0),0)/5;
  let sp=11;for(let i=1;i<=10;i++)if(ans['B'+i]==='R'){sp=i;break}
  let nB;if(sp>10)nB=1;else if(sp>=8)nB=2;else if(sp>=5)nB=3;else if(sp>=3)nB=4;else nB=5;
  const nC=ans.C||3;
  const d1p=(ans.D1||0)/10000;let d1;if(d1p<=5)d1=1;else if(d1p<=10)d1=2;else if(d1p<=20)d1=3;else if(d1p<=30)d1=4;else d1=5;
  const nD=(d1+(ans.D2||0)+(ans.D3||0)+(ans.D4||0))/4;
  const nE=[0,1,2,3,4].reduce((s,i)=>s+(ans['E'+i]||0),0)/5;
  const f=nA*.3+nB*.15+nC*.15+nD*.2+nE*.2;
  const tol=nA*(.3/.8)+nB*(.15/.8)+nC*(.15/.8)+nD*(.2/.8);
  return{A:nA,B:nB,C:nC,D:nD,E:nE,tol,cap:nE,f}
}

  svgParts.push(`<text x="${pad.l}" y="${pad.t-12}" font-size="8" fill="#6B7280" font-weight="600" letter-spacing="0.5">${lang==='en'?'ANNUALIZED RETURN (CAGR %)':'RETORNO ANUALIZADO (CAGR %)'}</text>`);
  svgParts.push(`<text x="${svgW/2}" y="${svgH-6}" text-anchor="middle" font-size="8" fill="#6B7280" font-weight="600" letter-spacing="0.5">${lang==='en'?'RISK (Standard Deviation %)':'RIESGO (Desviación Estándar %)'}</text>`);

  // Highlight zone for client tier
  const tp=portfolios.filter(p=>p.g===clientTier);
  if(tp.length>0){
    const mnSD=Math.min(...tp.map(p=>p.sd))-1.2,mxSD=Math.max(...tp.map(p=>p.sd))+1.2;
    const mnC=Math.min(...tp.map(p=>p.cagr))-1.5,mxC=Math.max(...tp.map(p=>p.cagr))+1.5;
    const rx=sx(mnSD),ry=sy(mxC),rw=sx(mxSD)-sx(mnSD),rh=sy(mnC)-sy(mxC);
    const tc=tierColors[clientTier];
    svgParts.push(`<rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" rx="6" fill="${tc}" fill-opacity="0.07" stroke="${tc}" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="4,3"/>`);
    svgParts.push(`<text x="${rx+rw/2}" y="${ry-5}" text-anchor="middle" font-size="9" font-weight="700" fill="${tc}">${lang==='en'?'YOUR PROFILE':'SU PERFIL'}</text>`);
  }

  // Frontier curve
  const fPts=[{sd:9.89,c:11.26},{sd:12.69,c:14.49},{sd:15.41,c:18.39},{sd:15.82,c:18.05},{sd:16.53,c:18.99},{sd:17.47,c:24},{sd:19.4,c:25.18}];
  const fPath=fPts.map((p,i)=>`${i===0?'M':'L'}${sx(p.sd).toFixed(1)},${sy(p.c).toFixed(1)}`).join(' ');
  svgParts.push(`<path d="${fPath}" fill="none" stroke="#1B2A4A" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>`);

  // VOO diamond
  const vx=sx(voo.sd),vy=sy(voo.cagr);
  svgParts.push(`<polygon points="${vx},${vy-6} ${vx+6},${vy} ${vx},${vy+6} ${vx-6},${vy}" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>`);
  svgParts.push(`<text x="${vx+9}" y="${vy-2}" font-size="8" font-weight="700" fill="#6B7280">VOO</text>`);
  svgParts.push(`<text x="${vx+9}" y="${vy+7}" font-size="7" fill="#9CA3AF">(S&amp;P 500)</text>`);

  // Portfolio dots
  portfolios.forEach(p=>{
    const cx=sx(p.sd),cy=sy(p.cagr);
    const tc=tierColors[p.g];
    const isCl=p.g===clientTier;
    const r=isCl?5.5:4;
    svgParts.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${tc}" opacity="${isCl?1:0.8}"/>`);
    if(isCl) svgParts.push(`<circle cx="${cx}" cy="${cy}" r="${r+2.5}" fill="none" stroke="${tc}" stroke-width="1.5" opacity="0.4"/>`);
    // Label offset
    let lx=cx+r+3,ly=cy+3;
    if(p.m==='1A'){lx=cx-r-2;ly=cy+8;}
    if(p.m==='4C'){ly=cy-5;}
    if(p.m==='5C'){ly=cy-5;}
    svgParts.push(`<text x="${lx}" y="${ly}" font-size="7.5" font-weight="${isCl?'700':'500'}" fill="${tc}">${p.m}</text>`);
  });
  svgParts.push('</svg>');
  const chartSVG=svgParts.join('');

  // Legend HTML
  let legendHTML='';
  legendData.forEach(li=>{
    const isCl=li.g===clientTier;
    const tc=tierColors[li.g];
    const arrow=isCl?(lang==='en'?' ◀ Your Profile':' ◀ Su Perfil'):'';
    legendHTML+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;${isCl?'font-weight:700':''}"><span style="width:10px;height:10px;border-radius:50%;background:${tc};flex-shrink:0;${isCl?'box-shadow:0 0 0 3px '+tc+'33':''}"></span><span style="font-size:8.5px;color:${isCl?tc:'#6B7280'}">${li.t}${arrow}</span></div>`;
  });
  // VOO legend
  legendHTML+=`<div style="display:flex;align-items:center;gap:8px;margin-top:2px"><span style="width:10px;height:10px;background:#D1D5DB;transform:rotate(45deg);flex-shrink:0"></span><span style="font-size:8px;color:#9CA3AF">${lang==='en'?'VOO — S&P 500 Benchmark':'VOO — Benchmark S&P 500'} (14.60% CAGR, 14.98% StdDev)</span></div>`;

  // Steps
  const steps=lang==='en'
    ?['Review your results and portfolio recommendation.','Schedule a consultation with your Atlas advisor to discuss your profile.','Together, we will select and customize the portfolio that best serves your goals.','Begin building your legacy with confidence.']
    :['Revise sus resultados y la recomendación de portafolio.','Agende una consulta con su asesor Atlas para discutir su perfil.','Juntos, seleccionaremos y personalizaremos el portafolio ideal para sus metas.','Comience a construir su legado con confianza.'];

  const barsHTML=scores.map((z,i)=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:3px"><span style="color:#1B2A4A;font-weight:600">${z.k}. ${labels[i]}</span><span style="color:#6B7280">${z.v.toFixed(2)} (${z.w})</span></div><div style="height:5px;background:#F1F5F9;border-radius:3px"><div style="height:100%;width:${Math.min(z.v/5*100,100)}%;background:linear-gradient(90deg,#1B2A4A,#2A3D66);border-radius:3px"></div></div></div>`).join('');

  const dualDesc=lang==='en'
    ?'Your final recommendation uses the lower of two independent axes to ensure your portfolio never exceeds your true comfort level.'
    :'Su recomendación final usa el menor de dos ejes independientes para asegurar que su portafolio nunca exceda su verdadero nivel de comodidad.';

  // ============= BUILD THE PRINT DOCUMENT =============
  const w=window.open('','_blank','width=850,height=1100');
  if(!w){alert(lang==='en'?'Please allow popups to download your PDF.':'Por favor permita popups para descargar su PDF.');return;}
